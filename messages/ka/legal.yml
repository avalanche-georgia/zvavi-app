legal:
  privacy:
    title: 'კონფიდენციალურობის პოლიტიკა'
    lastUpdated: 'ბოლო განახლება: თებერვალი 2026'
    intro: 'Avalanche Georgia ("ჩვენ") ვალდებულია დაიცვას თქვენი პირადი მონაცემები. ეს კონფიდენციალურობის პოლიტიკა განმარტავს, თუ როგორ ვაგროვებთ, ვიყენებთ და ვიცავთ ინფორმაციას, როცა გაწევრიანების განაცხადს შეავსებთ ან ჩვენს სერვისებს ისარგებლებთ.'
    dataCollected:
      title: 'რა მონაცემებს ვაგროვებთ'
      description: 'გაწევრიანების განაცხადის შევსებისას ვაგროვებთ შემდეგ პირად ინფორმაციას:'
      items:
        - 'სახელი და გვარი'
        - 'ელექტრონული ფოსტის მისამართი'
        - 'ტელეფონის ნომერი'
        - 'მისამართი (ქალაქი, ქვეყანა)'
        - 'ასაკი'
        - 'სქესი'
        - 'პროფესია'
        - 'გაწევრიანების მოტივაცია'
        - 'გადახდის მეთოდის პრეფერენცია'
    purpose:
      title: 'რატომ ვაგროვებთ თქვენს მონაცემებს'
      description: 'თქვენს პირად მონაცემებს ვიყენებთ შემდეგი მიზნებისთვის:'
      items:
        - 'გაწევრიანების განაცხადის დამუშავება და მართვა'
        - 'გაწევრიანების სტატუსის შესახებ კომუნიკაცია'
        - 'ორგანიზაციის აქტივობებისა და ღონისძიებების შესახებ ინფორმირება'
        - 'შიდა წევრობის ადმინისტრირება'
    storage:
      title: 'როგორ ინახება თქვენი მონაცემები'
      description: 'თქვენი მონაცემები უსაფრთხოდ ინახება Supabase-ის ღრუბლოვან მონაცემთა ბაზაში, რომელიც უზრუნველყოფს დაშიფვრას. ჩვენ ვიღებთ გონივრულ ზომებს თქვენი ინფორმაციის არასანქცირებული წვდომისგან, ცვლილებისგან ან განადგურებისგან დასაცავად.'
    access:
      title: 'ვის აქვს წვდომა'
      description: 'თქვენს პირად მონაცემებზე წვდომა აქვთ მხოლოდ ორგანიზაციის უფლებამოსილ ადმინისტრატორებს, რომლებსაც ეს ინფორმაცია სჭირდებათ წევრობის მართვისთვის. ჩვენ არ ვყიდით, არ ვაზიარებთ და არ ვავრცელებთ თქვენს პირად მონაცემებს მესამე მხარეებისთვის.'
    retention:
      title: 'მონაცემთა შენახვის ვადა'
      description: 'თქვენს პირად მონაცემებს ვინახავთ წევრობის აქტიურობის პერიოდში, პლუს გონივრული პერიოდი წევრობის დასრულების შემდეგ ადმინისტრაციული მიზნებისთვის. თქვენ შეგიძლიათ ნებისმიერ დროს მოითხოვოთ მონაცემების წაშლა.'
    rights:
      title: 'თქვენი უფლებები'
      description: 'თქვენ გაქვთ უფლება:'
      items:
        - 'წვდომა თქვენს პირად მონაცემებზე, რომლებსაც ვინახავთ'
        - 'არასწორი მონაცემების გასწორების მოთხოვნა'
        - 'მონაცემების წაშლის მოთხოვნა'
        - 'მონაცემთა დამუშავებაზე თანხმობის გაუქმება'
      contact: 'ამ უფლებების განსახორციელებლად, გთხოვთ დაგვიკავშირდეთ: <email>zvavisaqartvelo@gmail.com</email>.'
    changes:
      title: 'ცვლილებები ამ პოლიტიკაში'
      description: 'ჩვენ შეიძლება დროდადრო განვაახლოთ ეს კონფიდენციალურობის პოლიტიკა. ნებისმიერი ცვლილება გამოქვეყნდება ამ გვერდზე განახლებული თარიღით.'

  terms:
    title: 'მომსახურების პირობები'
    lastUpdated: 'ბოლო განახლება: თებერვალი 2026'
    intro: 'Avalanche Georgia-ს ("ჩვენ") სერვისების გამოყენებით ან გაწევრიანების განაცხადის შევსებით, თქვენ ეთანხმებით შემდეგ პირობებს.'
    membership:
      title: 'წევრობა'
      description: 'Avalanche Georgia არის რეგისტრირებული არაკომერციული, მოხალისეებზე დაფუძნებული ორგანიზაცია. წევრობა ღიაა ყველასთვის, ვინც მხარს უჭერს ჩვენს მისიას — ზვავის უსაფრთხოების გაუმჯობესებას საქართველოში. გაწევრიანების განაცხადები ექვემდებარება ორგანიზაციის განხილვასა და დამტკიცებას.'
    volunteerNature:
      title: 'მოხალისეობრივი ხასიათი'
      description: 'Avalanche Georgia-ში ყველა წვლილი მოხალისეობრივია. წევრები არ არიან თანამშრომლები და არ აქვთ კომპენსაციის მიღების უფლება მონაწილეობისთვის, თუ სხვაგვარად არ არის პირდაპირ შეთანხმებული.'
    acceptableUse:
      title: 'მისაღები გამოყენება'
      description: 'ჩვენი სერვისების გამოყენებით თქვენ ეთანხმებით:'
      items:
        - 'გაწევრიანების განაცხადში ზუსტი და სწორი ინფორმაციის მიწოდებას'
        - 'ორგანიზაციის წესდებაში მოცემული ქცევისა და ურთიერთობის სტანდარტების დაცვას'
        - 'ჩვენი პროგნოზებისა და ინფორმაციის პასუხისმგებლიანად გამოყენებას და მათ არ ჩანაცვლებას თქვენი საკუთარი განსჯით მთაში'
    disclaimer:
      title: 'პასუხისმგებლობის შეზღუდვა'
      description: 'Avalanche Georgia-ს მიერ მოწოდებული ზვავის პროგნოზები და უსაფრთხოების ინფორმაცია ეფუძნება ხელმისაწვდომ მონაცემებს, მაგრამ არ შეიძლება სიზუსტის გარანტია. მთაში მოგზაურობა თავისთავად შეიცავს რისკებს. თქვენ ხართ სრულად პასუხისმგებელი თქვენი უსაფრთხოების გადაწყვეტილებებზე მთაში. Avalanche Georgia და მისი წევრები არ იღებენ პასუხისმგებლობას ჩვენი ინფორმაციის გამოყენებით გამოწვეულ ნებისმიერ ტრავმაზე, დანაკარგზე ან ზიანზე.'
    fees:
      title: 'საწევრო გადასახადი'
      description: 'წევრობა ექვემდებარება წლიურ გადასახადს, როგორც განაცხადის პროცესში არის მითითებული. გადასახადი მხარს უჭერს ორგანიზაციის საოპერაციო ხარჯებს და არ ბრუნდება, თუ ორგანიზაცია სხვაგვარად არ გადაწყვეტს.'
    governingLaw:
      title: 'მოქმედი კანონმდებლობა'
      description: 'ეს პირობები რეგულირდება და განიმარტება საქართველოს კანონმდებლობის შესაბამისად.'
    changes:
      title: 'ცვლილებები ამ პირობებში'
      description: 'ჩვენ შეიძლება დროდადრო განვაახლოთ ეს მომსახურების პირობები. სერვისების გამოყენების გაგრძელება ცვლილებების შემდეგ ნიშნავს ახალი პირობების მიღებას.'
    contact:
      title: 'კონტაქტი'
      description: 'თუ გაქვთ შეკითხვები ამ პირობებთან დაკავშირებით, გთხოვთ დაგვიკავშირდეთ: <email>zvavisaqartvelo@gmail.com</email>.'

  consent:
    checkbox: 'ვეთანხმები <link>კონფიდენციალურობის პოლიტიკას</link> და <link2>მომსახურების პირობებს</link2>'
