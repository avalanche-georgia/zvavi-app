    content: 'ჩვენი ზვავის პროგნოზისტები საერთაშორისო კვალიფიკაციისა და გამოცდილების მქონე პროფესიონალები არიან, ხოლო მონაცემებს გამოცდილი დამკვირვებლები გვაწვდიან. მოგიწოდებთ გააკეთოთ საკუთარი დაკვირვებები და მიიღოთ გადაწყვეტილებები ისე, რომ მხოლოდ ჩვენს პროგნოზზე არ დაეყრდნოთ, რადგან ნებისმიერი პროგნოზი არის ზოგადი "საუკეთესო შეფასება" და ზოგიერთ შემთხვევაში შეიძლება არაზუსტი იყოს. ვერ ვაგებთ პასუხისმგებლობას ბექ-ქანთრში თქვენს მიერ განხორციელებულ ქმედებებზე, რომლებმაც შეიძლება გამოიწვიოს ტრავმა, ზარალი ან სიკვდილი.'
